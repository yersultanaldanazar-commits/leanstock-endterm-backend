name: LeanStock CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: leanstock
          POSTGRES_PASSWORD: leanstock
          POSTGRES_DB: leanstock
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U leanstock -d leanstock"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20
    env:
      NODE_ENV: test
      PORT: 3001
      DATABASE_URL: postgresql://leanstock:leanstock@localhost:5433/leanstock?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret-that-is-longer-than-32-chars
      JWT_REFRESH_SECRET: ci-refresh-secret-that-is-longer-than-32-chars
      JWT_ACCESS_EXPIRES_IN: 24h
      REFRESH_TOKEN_EXPIRES_DAYS: 30
      BCRYPT_ROUNDS: 4
      CORS_ORIGINS: http://localhost:3001
      RUN_JOBS: false
      RESERVATION_TTL_SECONDS: 900
      APP_BASE_URL: http://localhost:3001
      EMAIL_FROM: "LeanStock <onboarding@resend.dev>"
      RESEND_API_KEY: ""
      EMAIL_DRY_RUN: true
      EMAIL_WORKER_ENABLED: false
      EMAIL_WORKER_INTERVAL_MS: 2000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run lint
      - run: npm test
      - run: docker build -f docker/Dockerfile -t leanstock-api:test .
